name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/urbangolf

jobs:
  # =====================================================================
  # 1) Statische Checks — Lint + TypeScript (schnell, blockiert alles andere)
  # =====================================================================
  static-checks:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --workspaces --include-workspace-root

      - name: Lint (Frontend)
        run: npm run lint --workspace=frontend

      - name: Lint (Backend)
        run: npm run lint --workspace=backend

      - name: Type-Check (Frontend)
        run: npm run type-check --workspace=frontend

  # =====================================================================
  # 2) Unit-Tests — parallel für Frontend + Backend
  # =====================================================================
  unit-frontend:
    name: Unit Tests (Frontend)
    needs: static-checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci --workspaces --include-workspace-root
      - name: Run Vitest
        run: npm run test --workspace=frontend

  unit-backend:
    name: Unit Tests (Backend)
    needs: static-checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci --workspaces --include-workspace-root
      - name: Run Vitest
        run: npm run test --workspace=backend

  # =====================================================================
  # 3) Smoke-E2E — Playwright mit gemockter API, kein Backend nötig
  #    Schnelles Gate (~30s) um Regressions im Frontend sofort zu erkennen.
  # =====================================================================
  e2e-smoke:
    name: E2E Smoke (Mock-API)
    needs: static-checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --workspaces --include-workspace-root

      - name: Get Playwright version
        id: playwright-version
        working-directory: frontend
        run: echo "version=$(npx playwright --version | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        working-directory: frontend
        run: npx playwright install-deps chromium

      - name: Run smoke tests
        run: npm run test:e2e:smoke --workspace=frontend

      - name: Upload smoke report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-report
          path: frontend/playwright-report-smoke/
          retention-days: 7

  # =====================================================================
  # 4) Meta-Gate — muss für Branch-Protection grün sein
  #    Hinweis: früher gab es hier einen e2e-integration Job (Playwright
  #    gegen echtes Backend + Postgres). Dieser wurde entfernt, weil die
  #    Tests ans alte UI gebunden waren und die Smoke-Suite + künftige
  #    Backend-Contract-Tests die Coverage effizienter abdecken.
  #    Plan: .claude/plans/backend-contract-tests.md
  # =====================================================================
  ci-green:
    name: CI Green
    # `e2e-integration` ist bewusst NICHT in needs — solange der Job via
    # `if: false` ausgelagert ist, blockiert er sonst den gesamten Pfad
    # (inkl. Deploys), weil GitHub Actions "skipped" entlang der Needs-Kette
    # propagiert und der Skip-Workaround mit `if: always()` nicht immer
    # zuverlässig greift. Wenn Integration wieder live ist: hier und im
    # Kommentar oben ergänzen.
    needs: [static-checks, unit-frontend, unit-backend, e2e-smoke]
    runs-on: ubuntu-latest

    steps:
      - name: Check all upstream jobs
        run: |
          set -e
          test "${{ needs.static-checks.result }}" = "success"
          test "${{ needs.unit-frontend.result }}" = "success"
          test "${{ needs.unit-backend.result }}"  = "success"
          test "${{ needs.e2e-smoke.result }}"     = "success"

  # =====================================================================
  # Deploy — nur auf main-Push, wenn CI green ist
  # =====================================================================
  deploy-backend:
    name: Deploy Backend
    needs: ci-green
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend
          tags: |
            type=raw,value=latest
            type=sha,prefix={{branch}}-

      - uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-frontend:
    name: Deploy Frontend
    needs: ci-green
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend
          tags: |
            type=raw,value=latest
            type=sha,prefix={{branch}}-

      - uses: docker/setup-buildx-action@v3

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_API_BASEURL=/api
          cache-from: type=gha
          cache-to: type=gha,mode=max
